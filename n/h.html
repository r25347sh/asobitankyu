<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,height=device-height,initial-scale=1.0,user-scalable=no">
    <style>
      /* メニュー全体のベースデザイン */
body {
  background-color: #333;
}

.menu-list {
  display: flex;
  list-style: none;
  margin: 0;
  padding: 0;
}

/* メインメニューの項目 */
.menu-item {
  position: relative; /* 子メニューの配置基準点にする */
}

.menu-item a {
  display: block;
  padding: 15px 20px;
  color: #fff;
  text-decoration: none;
}

/* --- ドロップダウン部分 --- */
.dropdown-list {
  display: none; /* 初期状態では非表示 */
  position: absolute;
  top: 100%; /* 親メニューの真下に配置 */
  left: 0;
  background-color: #444;
  list-style: none;
  padding: 0;
  margin: 0;
  min-width: 150px;
}

/* カーソルを合わせた時にドロップダウンを表示 */
.menu-item:hover .dropdown-list {
  display: block;
}

/* ドロップダウン内の項目 */
.dropdown-list li a {
  padding: 12px 15px;
}

/* カーソルを合わせた時のホバーカラー */
.menu-item a:hover,
.dropdown-list li a:hover {
  background-color: #0056b3;
}

    </style>
  </head>
  <body>
    <ul>
      <li><a href="../index.html">ホーム</a></li>
      <ul style=""></ul>
    </ul>
  </body>
</html>
